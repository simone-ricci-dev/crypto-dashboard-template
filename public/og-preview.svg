<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070709"/>
      <stop offset="100%" style="stop-color:#0e0e18"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e676;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00e676;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="pro" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#448aff"/>
      <stop offset="100%" style="stop-color:#d500f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Verdict banner (green) -->
  <rect x="40" y="40" width="1120" height="90" rx="14" fill="url(#green)" stroke="#00e676" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="70" y="97" font-family="system-ui,sans-serif" font-size="32" font-weight="900" fill="#00e676" letter-spacing="-1">ENTER NOW ▲ LONG</text>
  <text x="600" y="97" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">Entry $68,400 · SL $66,800 · TP1 $70,200</text>

  <!-- Price bar -->
  <rect x="40" y="152" width="1120" height="60" rx="12" fill="#0e0e12" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="72" y="191" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#f0f0f0" letter-spacing="-1">$68,421.50</text>
  <rect x="250" y="174" width="72" height="24" rx="6" fill="rgba(0,230,118,0.12)"/>
  <text x="262" y="191" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#00e676">+2.34%</text>
  <circle cx="1090" cy="182" r="5" fill="#00e676"/>
  <text x="1102" y="187" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">WS live</text>

  <!-- Sentiment card -->
  <rect x="40" y="234" width="540" height="100" rx="12" fill="#0e0e12" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="70" y="262" font-family="system-ui,sans-serif" font-size="10" fill="#666" letter-spacing="1" text-transform="uppercase">FEAR &amp; GREED</text>
  <text x="70" y="300" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="#ff3d57">38</text>
  <text x="130" y="300" font-family="system-ui,sans-serif" font-size="16" fill="rgba(255,255,255,0.6)">Fear</text>
  <rect x="70" y="314" width="450" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
  <rect x="70" y="314" width="171" height="4" rx="2" fill="#ff3d57"/>

  <!-- On-chain panel -->
  <rect x="620" y="234" width="540" height="100" rx="12" fill="#0e0e12" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="650" y="262" font-family="system-ui,sans-serif" font-size="10" fill="#666" letter-spacing="1">ON-CHAIN</text>
  <!-- Hashrate -->
  <rect x="650" y="272" width="150" height="50" rx="8" fill="#14141a"/>
  <text x="665" y="289" font-family="system-ui,sans-serif" font-size="9" fill="#666">HASHRATE</text>
  <text x="665" y="307" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#f0f0f0">782 EH/s</text>
  <!-- Mempool -->
  <rect x="815" y="272" width="150" height="50" rx="8" fill="#14141a"/>
  <text x="830" y="289" font-family="system-ui,sans-serif" font-size="9" fill="#666">MEMPOOL</text>
  <text x="830" y="307" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#f0f0f0">12,450 tx</text>
  <!-- Fees -->
  <rect x="980" y="272" width="150" height="50" rx="8" fill="#14141a"/>
  <text x="995" y="289" font-family="system-ui,sans-serif" font-size="9" fill="#666">FAST FEE</text>
  <text x="995" y="307" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#f0f0f0">18 sat/vB</text>

  <!-- PRO divider -->
  <line x1="40" y1="360" x2="510" y2="360" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="530" y="365" font-family="system-ui,sans-serif" font-size="11" fill="#444">PRO features</text>
  <line x1="690" y1="360" x2="1160" y2="360" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Quant card (blurred PRO) -->
  <rect x="40" y="380" width="540" height="80" rx="12" fill="#0e0e12" stroke="rgba(68,138,255,0.2)" stroke-width="1"/>
  <rect x="40" y="380" width="540" height="80" rx="12" fill="rgba(7,7,9,0.7)"/>
  <rect x="230" y="408" width="60" height="24" rx="5" fill="url(#pro)"/>
  <text x="244" y="425" font-family="system-ui,sans-serif" font-size="11" font-weight="900" fill="white" letter-spacing="1">PRO</text>
  <text x="305" y="425" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.7)">Quant Scoring</text>

  <!-- Command card (blurred PRO) -->
  <rect x="620" y="380" width="540" height="180" rx="12" fill="#0e0e12" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
  <rect x="620" y="380" width="540" height="180" rx="12" fill="rgba(7,7,9,0.7)"/>
  <rect x="840" y="448" width="60" height="24" rx="5" fill="url(#pro)"/>
  <text x="854" y="465" font-family="system-ui,sans-serif" font-size="11" font-weight="900" fill="white" letter-spacing="1">PRO</text>
  <text x="905" y="465" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="rgba(255,255,255,0.7)">AI Trading Command</text>

  <!-- Bottom CTA -->
  <rect x="40" y="480" width="540" height="110" rx="14" fill="rgba(68,138,255,0.06)" stroke="rgba(68,138,255,0.25)" stroke-width="1"/>
  <text x="310" y="528" font-family="system-ui,sans-serif" font-size="22" font-weight="900" fill="#f0f0f0" text-anchor="middle" letter-spacing="-0.5">Crypto Trading Dashboard</text>
  <text x="310" y="556" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Next.js · TypeScript · Tailwind · WebSocket</text>
  <rect x="220" y="568" width="180" height="36" rx="9" fill="url(#pro)"/>
  <text x="310" y="591" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">Buy PRO — €59</text>

  <!-- Watermark -->
  <text x="1160" y="620" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.15)" text-anchor="end">crypto-dashboard-template.vercel.app</text>
</svg>
